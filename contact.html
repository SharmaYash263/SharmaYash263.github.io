<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y.S - Contact Me</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/jpg" href="images/profiles/icon_pfp.jpg">
    <script src="header.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

    <section id="home" class="welcome-section">
        <h2 class="welcome-heading">Let's Get in Touch!</h2>
    </section>
    <hr>

    <section class="contact-section">
        <form action="https://formspree.io/f/mkgwbprw" method="POST">
            <input type="text" name="name" placeholder="Your Name Here" required />
            <input type="email" name="email" placeholder="Your Email Here" required />
            <textarea name="message" placeholder="Enter Message Here" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </section>

</body>
</html>
